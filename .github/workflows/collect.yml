name: collect
# Hourly data collection for short-horizon binary market windows.
# Resident mode (55 min) wakes at every 15-min boundary for order-book snapshots,
# then backfills closed windows. Ledger committed back to the repo after each run.
on:
  schedule:
    - cron: '2 * * * *'
  workflow_dispatch: {}

concurrency:
  group: collect
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Collect (resident 55 min)
        run: python collect.py --resident 55 || true
      - name: Commit ledger
        run: |
          git config user.name  "collector-bot"
          git config user.email "actions@github.com"
          git add data/ledger.jsonl 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no change"
          else
            git commit -m "data @ $(date -u +%Y-%m-%dT%H:%MZ) [skip ci]"
            git pull --rebase --autostash origin ${GITHUB_REF_NAME} || true
            git push origin HEAD:${GITHUB_REF_NAME}
          fi
